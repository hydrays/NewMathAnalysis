<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$if(title)$$title$$endif$</title>
  $for(author-meta)$<meta name="author" content="$author-meta$">$endfor$
  $if(description)$<meta name="description" content="$description$">$endif$
  $for(keywords)$<meta name="keywords" content="$keywords$">$endfor$
  $if(og-description)$<meta property="og:description" content="$og-description$">$endif$
  $if(og-image)$<meta property="og:image" content="$og-image$">$endif$
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/chapter.css">
  <link rel="stylesheet" href="assets/app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script type="importmap">
  {"imports":{"three":"./assets/three.module.js","three/addons/":"./assets/three-addons/"}}
  </script>
  <!-- Preload three.js and the addons our scenes use, so they parse in
       parallel with the page and the lazy-imported scene modules don't
       have to wait for the 1.3 MB core to arrive. -->
  <link rel="modulepreload" href="assets/three.module.js">
  <link rel="modulepreload" href="assets/three-addons/controls/OrbitControls.js">
  <link rel="modulepreload" href="assets/three-addons/lines/Line2.js">
  <link rel="modulepreload" href="assets/three-addons/lines/LineGeometry.js">
  <link rel="modulepreload" href="assets/three-addons/lines/LineMaterial.js">
  <link rel="modulepreload" href="assets/three-addons/lines/LineSegments2.js">
  <link rel="modulepreload" href="assets/three-addons/lines/LineSegmentsGeometry.js">
  <link rel="modulepreload" href="assets/three-addons/renderers/CSS2DRenderer.js">

  <style media="print">
    html, body {
      height: auto !important;
      overflow: visible !important;
      font-size: 12pt;
    }
    #sidebar, #overlay, #topbar, #video-panel { display: none !important; }
    #main {
      margin-left: 0 !important;
      padding-left: 0 !important;
      width: 100% !important;
      max-width: none !important;
      height: auto !important;
      overflow: visible !important;
      transform: none !important;
    }
    #content {
      max-width: none !important;
      width: 100% !important;
      height: auto !important;
      overflow: visible !important;
      padding: 0 12mm !important;
    }
    /* Three.js canvases don't render in PDF — leave space, avoid breaking */
    [id^="chpt"][id*="-"], [id^="vf3d-"] {
      max-height: 320px !important;
      page-break-inside: avoid;
    }
    figure, table, blockquote, .callout, .ex-block, .exercise-block {
      page-break-inside: avoid;
    }
    h1 { page-break-before: page; }
    h1:first-of-type { page-break-before: avoid; }
    h2, h3 { page-break-after: avoid; }
    img { max-width: 100%; height: auto; page-break-inside: avoid; }
    a { color: #1a3d8f; text-decoration: none; }
    .open-sidebar-btn, .menu-toggle, .floating-btn, .video-btn { display: none !important; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="doc-nav">
      <ul id="doc-nav-list"></ul>
    </div>
    <div class="nav-divider"></div>
    <div id="toc-nav">
      <div class="nav-section-title">Contents</div>
      $toc$
    </div>
  </div>

  <div id="overlay" onclick="closeSidebar()"></div>

  <div id="main">
    <div id="topbar">
      <button id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">&#9776;</button>
      <span id="topbar-title">$if(title)$$title$$endif$</span>
      <button id="pdf-btn" onclick="window.print()" title="Print / Save as PDF">&#128438;</button>
    </div>
    <div id="video-panel">
      <button id="video-close-btn" aria-label="Close video">&times;</button>
      <iframe id="video-frame" src="" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      <button id="video-close-bottom" onclick="void(0)">&#9650; 收起视频</button>
    </div>
    <div id="content">
      $body$
    </div>
  </div>

  <script>
    window.docLib = $doc_lib_json$;
    window.chpAutonum = "$chp_autonum$";
  </script>
  <script src="assets/app.js"></script>
  <script src="assets/three-lazy.js"></script>
</body>
</html>
