<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadratic Critical Point Surface</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        :root {
            --bg: #0b1319;
            --panel: #12202a;
            --line: rgba(255, 255, 255, 0.08);
            --ink: #edf3f6;
            --gold: #f2b563;
            --shadow: rgba(0, 0, 0, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(114, 209, 194, 0.10), transparent 20%),
                radial-gradient(circle at top right, rgba(242, 181, 99, 0.12), transparent 22%),
                linear-gradient(180deg, #091018 0%, #111921 100%);
        }

        .app {
            width: min(1360px, calc(100vw - 16px));
            margin: 8px auto;
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 12px;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 18px;
            background:
                linear-gradient(180deg, rgba(25, 40, 51, 0.95), rgba(15, 24, 31, 0.98)),
                linear-gradient(135deg, rgba(255, 255, 255, 0.03), transparent 50%);
            box-shadow: 0 18px 40px var(--shadow);
        }

        .controls {
            padding: 14px;
            display: grid;
            gap: 10px;
            align-content: start;
        }

        .control {
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.035);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .control label {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 15px;
        }

        .control .value {
            color: var(--gold);
        }

        input[type="range"] {
            width: 100%;
            margin-top: 10px;
            accent-color: var(--gold);
        }

        .viewer {
            padding: 8px;
        }

        .plot-box {
            height: 680px;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
        }

        #surface-plot {
            width: 100%;
            height: 100%;
        }

        @media (max-width: 900px) {
            .app {
                width: min(100vw - 10px, 100%);
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .plot-box {
                height: 480px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="panel controls">
            <div class="control">
                <label for="slider-lambda1">
                    <span>lambda1</span>
                    <span id="value-lambda1" class="value"></span>
                </label>
                <input id="slider-lambda1" type="range" min="-2" max="2" step="0.05" value="1.2">
            </div>

            <div class="control">
                <label for="slider-lambda2">
                    <span>lambda2</span>
                    <span id="value-lambda2" class="value"></span>
                </label>
                <input id="slider-lambda2" type="range" min="-2" max="2" step="0.05" value="0.8">
            </div>

            <div class="control">
                <label for="slider-theta">
                    <span>theta</span>
                    <span id="value-theta" class="value"></span>
                </label>
                <input id="slider-theta" type="range" min="-90" max="90" step="1" value="18">
            </div>
        </section>

        <section class="panel viewer">
            <div class="plot-box">
                <div id="surface-plot"></div>
            </div>
        </section>
    </main>

    <script src="./critical_points_plotly.js"></script>
</body>
</html>
